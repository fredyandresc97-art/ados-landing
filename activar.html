<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #EFEFEF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .logo img { height: 64px; max-width: 260px; object-fit: contain; }
    .divider {
      border: none;
      border-top: 2px solid #E8A020;
      margin: 16px 0 24px;
    }
    h2 {
      text-align: center;
      font-size: 18px;
      color: #2C3348;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;

    input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #DDD;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input[type=password]:focus { border-color: #E8A020; }
    button {
      width: 100%;
      padding: 12px;
      background: #E8A020;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #cf8f18; }
    button:disabled { background: #ccc; cursor: default; }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .msg.success { background: #E8F5E9; color: #2E7D32; display: block; }
    .msg.error   { background: #FFEBEE; color: #C62828; display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="2.TITULOADOS.png" alt="ADOS Ingeniería y Arquitectura SAS" />
  </div>
  <hr class="divider"/>
  <h2 id="titulo">Establece tu contraseña</h2>

    <label>Confirmar contraseña</label>
    <input type="password" id="pass2" placeholder="Repite la contraseña" />
    <button id="btn" onclick="establecerContrasena()">Activar cuenta</button>
  </div>

  <div id="msg" class="msg"></div>
</div>

<script>
  const SUPABASE_URL  = 'https://svfxbbdqekcvquxcbemz.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_SP80av9QptBAN6vVxFUKcg_Sx9132CG';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = {};
    hash.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

showMsg('El link es inválido o ha expirado. Contacta a soporte@adosiya.com', 'error');

      return;
    }
    if (params.access_token && params.refresh_token) {
      const { error } = await client.auth.setSession({
        access_token:  params.access_token,
        refresh_token: params.refresh_token
      });
      if (error) {
        showMsg('El link ha expirado. Contacta a soporte@adosiya.com', 'error');
        document.getElementById('form-section').style.display = 'none';
      }
    } else {
      showMsg('Link inválido. Contacta a soporte@adosiya.com', 'error');
      document.getElementById('form-section').style.display = 'none';
    }
  }

  async function establecerContrasena() {
    const pass1 = document.getElementById('pass1').value;
nst pass2 = document.getElementById('pass2').value;
    clearMsg();

    if (pass1.length < 8) {
      showMsg('La contraseña debe tener al menos 8 caracteres.', 'error'); return;
    }
    if (pass1 !== pass2) {
      showMsg('Las contraseñas no coinciden.', 'error'); return;
    }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    const { error } = await client.auth.updateUser({ password: pass1 });

    if (error) {
      showMsg('Error: ' + error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Activar cuenta';
    } else {
      document.getElementById('form-section').style.display = 'none';
showMsg('Tu contraseña fue establecida correctamente. Ya puedes iniciar sesión en el plugin ADOS.', 'success');
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }

  init();
</script>

</html>
