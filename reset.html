<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ADOS Software — Nueva contraseña</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #EFEFEF;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      width: 380px;
      overflow: hidden;
    }
    .logo-wrap { padding: 28px 32px 0; text-align: center; }
    .logo-wrap img { height: 64px; object-fit: contain; }
    .accent { background: #F9B233; height: 3px; margin-top: 18px; }
    .body { padding: 24px 28px 28px; }
    h1 {
      font-size: 16px; font-weight: 600; color: #1F2937;
      text-align: center; margin-bottom: 20px;
    }
    .label {
      display: block; font-size: 10px; font-weight: 700;
      color: #9CA3AF; margin: 0 0 5px 4px;
    }
    .input-wrap {
      background: #F3F4F6; border: 1px solid #E5E7EB;
      border-radius: 9px; margin-bottom: 14px;
    }
    .input-wrap input {
      width: 100%; background: transparent; border: none; outline: none;
      padding: 9px 12px; font-size: 13px; color: #1F2937;
      font-family: inherit;
    }
    .btn {
      width: 100%; height: 42px; background: #F9B233;
      color: #1F2937; font-weight: 700; font-size: 13px;
      border: none; border-radius: 9px; cursor: pointer;
      margin-top: 8px; font-family: inherit;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 11px; margin: 4px 4px 8px; }
    .error   { color: #DC2626; }
    .success { color: #059669; }
    .hidden  { display: none; }
    .card-ok {
      background: #ECFDF5; border: 1px solid #6EE7B7;
      border-radius: 9px; padding: 16px; text-align: center;
      margin-bottom: 22px;
    }
    .card-ok .title { color: #059669; font-weight: 600; font-size: 14px; }
    .card-ok .sub   { color: #6EE7B7; font-size: 12px; margin-top: 8px; }
    .card-err {
      background: #FEF2F2; border: 1px solid #FCA5A5;
      border-radius: 9px; padding: 16px; text-align: center;
    }
    .card-err .title { color: #DC2626; font-weight: 600; font-size: 13px; }
    .card-err .sub   { color: #EF4444; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="assets/logo.png" alt="ADOS Software"
         onerror="this.style.display='none';document.getElementById('logoText').style.display='block'"/>
    <p id="logoText" style="display:none;font-size:20px;font-weight:700;color:#1F2937;">ADOS Software</p>
  </div>
  <div class="accent"></div>
  <div class="body">

    <!-- Formulario nueva clave -->
    <div id="formWrap">
      <h1>Nueva contraseña</h1>
      <span class="label">NUEVA CONTRASEÑA</span>
      <div class="input-wrap">
        <input id="pwd1" type="password" placeholder="Mínimo 6 caracteres"/>
      </div>
      <span class="label">CONFIRMAR CONTRASEÑA</span>
      <div class="input-wrap">
        <input id="pwd2" type="password" placeholder="Repite la contraseña"/>
      </div>
      <p id="msg" class="msg hidden"></p>
      <button class="btn" id="btnGuardar" onclick="cambiarClave()">GUARDAR CONTRASEÑA</button>
    </div>

    <!-- Éxito -->
    <div id="successWrap" class="hidden">
      <h1>¡Contraseña actualizada!</h1>
      <div class="card-ok">
        <p class="title">Ya puedes iniciar sesión</p>
        <p class="sub">Vuelve al plugin de Revit e inicia sesión con tu nueva contraseña.</p>
      </div>
    </div>

    <!-- Error (enlace inválido) -->
    <div id="errorWrap" class="hidden">
      <div class="card-err">
        <p class="title">Enlace inválido o expirado</p>
        <p class="sub">Solicita un nuevo enlace desde el plugin de Revit.</p>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://svfxbbdqekcvquxcbemz.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_SP80av9QptBAN6vVxFUKcg_Sx9132CG';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const hash   = window.location.hash.substring(1);
  const params = Object.fromEntries(new URLSearchParams(hash));

  if (!params.access_token || params.type !== 'recovery') {
    document.getElementById('formWrap').classList.add('hidden');
    document.getElementById('errorWrap').classList.remove('hidden');
  } else {
    supabase.auth.setSession({
      access_token:  params.access_token,
      refresh_token: params.refresh_token
    });
  }

  async function cambiarClave() {
    const pwd1 = document.getElementById('pwd1').value;
    const pwd2 = document.getElementById('pwd2').value;
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btnGuardar');

    msg.className = 'msg';
    if (pwd1.length < 6) {
      msg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
      msg.classList.add('error'); return;
    }
    if (pwd1 !== pwd2) {
      msg.textContent = 'Las contraseñas no coinciden.';
      msg.classList.add('error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const { error } = await supabase.auth.updateUser({ password: pwd1 });

    if (error) {
      msg.textContent = 'Error: ' + error.message;
      msg.classList.add('error');
      btn.disabled = false;
      btn.textContent = 'GUARDAR CONTRASEÑA';
    } else {
      document.getElementById('formWrap').classList.add('hidden');
      document.getElementById('successWrap').classList.remove('hidden');
    }
  }

  document.getElementById('pwd2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') cambiarClave();
  });
</script>
</body>
</html>
